<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Recommender</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background-color:#f8f9fa;">

<div class="container">

    <h1 class="text-center mt-4">📚 Book Recommendation System 📚</h1>

    <!-- Search Box -->
    <form action="/recommend" method="post" class="mt-4">
        {% csrf_token %}
        <div class="row justify-content-center">
            <div class="col-md-6">
                <input type="text" name="user_input" class="form-control" placeholder="Enter a book name">
            </div>
            <div class="col-md-2">
                <button class="btn btn-primary w-100">Recommend</button>
            </div>
        </div>
    </form>

    <hr>

    <!-- Popular Books -->
    <h3 class="mt-4">🔥 Popular Books</h3>

    <div class="row">
        {% for book in popular_books %}
        <div class="col-md-3 mt-4">
            <div class="card shadow-sm">
                <img src="{{ book.2 }}" class="card-img-top" style="height:250px;">
                <div class="card-body">
                    <h6>{{ book.0 }}</h6>
                    <p class="text-muted">{{ book.1 }}</p>
                    <small>⭐ {{ book.4 }}</small>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

</div>

</body>
</html>
